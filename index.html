<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Countdown Starts</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: url('image.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .content {
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            min-width: 120px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .countdown-box:hover {
            transform: translateY(-5px);
        }

        .number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }

        .label {
            font-size: 1em;
            margin-top: 5px;
            opacity: 0.9;
        }

        .message {
            font-size: 1.5em;
            font-style: italic;
            margin-top: 20px;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        @media (max-width: 600px) {
            .countdown {
                flex-direction: column;
                gap: 10px;
            }

            h1 {
                font-size: 2em;
            }

            .countdown-box {
                min-width: 100px;
                padding: 15px;
            }

            .number {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h1>🌙 Eid Mubarak 🌙</h1>
        <div class="countdown">
            <div class="countdown-box">
                <span class="number">10</span>
                <span class="label">Days</span>
            </div>
            <div class="countdown-box">
                <span class="number">05</span>
                <span class="label">Hours</span>
            </div>
            <div class="countdown-box">
                <span class="number">30</span>
                <span class="label">Minutes</span>
            </div>
            <div class="countdown-box">
                <span class="number">45</span>
                <span class="label">Seconds</span>
            </div>
        </div>
        <p class="message">May this Eid bring happiness, peace, and joy to your heart! 🎉</p>
    </div>
</body>
</html>
